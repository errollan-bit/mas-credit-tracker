version: '3.8'

services:
  db-local:
    image: mysql:8.0
    container_name: mas-credit-db
    restart: always
    environment:
      MYSQL_DATABASE: mas_credit_dev
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: